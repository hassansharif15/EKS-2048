name: Deploy Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/**'
      - 'app/**'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: eks-2048
  CLUSTER_NAME: eks-2048-cluster

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Install NGINX Ingress Controller
        run: |
          helm repo add ingress-nginx \
            https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx \
            ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --set controller.replicaCount=2 \
            --wait

      - name: Install CertManager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager \
            jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version v1.14.0 \
            --set installCRDs=true \
            --wait

      - name: Apply CertManager ClusterIssuer
        run: |
          sed -i "s/ACCOUNT_ID_PLACEHOLDER/${{ secrets.AWS_ACCOUNT_ID }}/g" \
            k8s/certmanager-rbac.yaml
          sed -i "s/CERT_MANAGER_EMAIL_PLACEHOLDER/${{ secrets.CERT_MANAGER_EMAIL }}/g" \
            k8s/certmanager-issuer.yaml
          sed -i "s/HOSTED_ZONE_ID_PLACEHOLDER/${{ secrets.HOSTED_ZONE_ID }}/g" \
            k8s/certmanager-issuer.yaml
          kubectl apply -f k8s/certmanager-rbac.yaml
          kubectl apply -f k8s/certmanager-issuer.yaml

      - name: Install ExternalDNS
        run: |
          sed -i "s/ACCOUNT_ID_PLACEHOLDER/${{ secrets.AWS_ACCOUNT_ID }}/g" \
            k8s/externaldns.yaml
          kubectl apply -f k8s/externaldns.yaml

      - name: Install ArgoCD
        run: |
        kubectl create namespace argocd --dry-run=client -o yaml | \
            kubectl apply -f -
          kubectl apply -n argocd \
            --server-side \
            --force-conflicts \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          kubectl wait --for=condition=available \
            deployment/argocd-server \
            -n argocd \
            --timeout=180s

      - name: Apply ArgoCD Application
        run: |
          kubectl apply -f k8s/argocd-app.yaml

      - name: Install Prometheus and Grafana
        run: |
          helm repo add prometheus-community \
            https://prometheus-community.github.io/helm-charts
          helm repo update
          sed -i "s/GRAFANA_PASSWORD_PLACEHOLDER/${{ secrets.GRAFANA_PASSWORD }}/g" \
            k8s/monitoring/prometheus-values.yaml
          helm upgrade --install kube-prometheus-stack \
            prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            --values k8s/monitoring/prometheus-values.yaml \
            --wait

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          sed -i "s|ACCOUNT_ID_PLACEHOLDER|${{ secrets.AWS_ACCOUNT_ID }}|g" \
            k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/eks-2048 --timeout=120s
          kubectl get pods
          kubectl get ingress
          kubectl get svc -n ingress-nginx