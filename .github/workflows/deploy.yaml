name: Deploy Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/**'        # runs when k8s files change
      - 'app/**'        # runs when app files change

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: eks-2048
  CLUSTER_NAME: eks-2048-cluster

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest

    steps:
      # Step 1 - checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 - configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 3 - connect kubectl to EKS cluster
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      # Step 4 - install NGINX Ingress Controller
      - name: Install NGINX Ingress Controller
        run: |
          helm repo add ingress-nginx \
            https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx \
            ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --set controller.replicaCount=2 \
            --wait

      # Step 5 - install CertManager
      - name: Install CertManager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager \
            jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version v1.14.0 \
            --set installCRDs=true \
            --wait

      # Step 6 - apply CertManager issuer
      - name: Apply CertManager ClusterIssuer
        run: |
          sed -i "s/CERT_MANAGER_EMAIL_PLACEHOLDER/${{ secrets.CERT_MANAGER_EMAIL }}/g" \
            k8s/certmanager-issuer.yaml
          sed -i "s/HOSTED_ZONE_ID_PLACEHOLDER/${{ secrets.HOSTED_ZONE_ID }}/g" \
            k8s/certmanager-issuer.yaml
          kubectl apply -f k8s/certmanager-rbac.yaml
          kubectl apply -f k8s/certmanager-issuer.yaml

      # Step 7 - install ExternalDNS
      - name: Install ExternalDNS
        run: |
          sed -i "s/ACCOUNT_ID_PLACEHOLDER/${{ secrets.AWS_ACCOUNT_ID }}/g" \
            k8s/externaldns.yaml
          kubectl apply -f k8s/externaldns.yaml

      # Step 8 - login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 9 - build and push Docker image
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # Step 10 - update deployment with new image
      - name: Update deployment image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          sed -i "s|ACCOUNT_ID_PLACEHOLDER|${{ secrets.AWS_ACCOUNT_ID }}|g" \
            k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # Step 11 - apply ingress
      - name: Apply Ingress
        run: |
          kubectl apply -f k8s/ingress.yaml

      # Step 12 - verify deployment
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/eks-2048 --timeout=120s
          kubectl get pods
          kubectl get ingress
          kubectl get svc -n ingress-nginx