prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        memory: "400Mi"
        cpu: "200m"
      limits:
        memory: "800Mi"
        cpu: "400m"

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: "100Mi"
        cpu: "50m"
      limits:
        memory: "200Mi"
        cpu: "100m"

grafana:
  enabled: true
  adminPassword: GRAFANA_PASSWORD_PLACEHOLDER
  resources:
    requests:
      memory: "100Mi"
      cpu: "100m"
    limits:
      memory: "200Mi"
      cpu: "200m"
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - grafana.devopsbyhassan.com
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.devopsbyhassan.com

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true