apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-2048
  namespace: default
  labels:
    app: eks-2048
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eks-2048
  template:
    metadata:
      labels:
        app: eks-2048
    spec:
      containers:
        - name: eks-2048
          image: ACCOUNT_ID_PLACEHOLDER.dkr.ecr.eu-west-1.amazonaws.com/eks-2048:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
