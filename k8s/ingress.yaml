apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eks-2048
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - eks.devopsbyhassan.com
      secretName: eks-2048-tls
  rules:
    - host: eks.devopsbyhassan.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eks-2048-service
                port:
                  number: 80