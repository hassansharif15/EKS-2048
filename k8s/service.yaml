apiVersion: v1
kind: Service
metadata:
  name: eks-2048-service
  namespace: default
  labels:
    app: eks-2048
spec:
  selector:
    app: eks-2048              # routes traffic to pods with this label
  ports:
    - protocol: TCP
      port: 80                 # port the service listens on
      targetPort: 80           # port on the container to forward to
  type: ClusterIP              # internal only — ingress handles external traffic